tests:

  ##### Unconditional Generation #####
  - inference:
      random_seed: 1337
      final_step: 48
    contigmap:
      contigs: ["150-150"]

  - inference:
      random_seed: 1337
      final_step: 48
    contigmap:
      contigs: ["700-700"]
    diffuser:
      T: 15

  ##### Motif Scaffolding #####
  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/5TPN.pdb"
    contigmap:
      contigs: ["10-10/A163-181/10-10"] # Generate 10 AA before and after the scaffold

  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/5TPN.pdb"
    contigmap:
      contigs: ["40-40/A163-181/40-40"] # Generate 40 AA before and after the scaffold

  ##### Motif Scaffolding with target #####
  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/1YCR.pdb"
      ckpt_override_path: "../models/Complex_base_ckpt.pt"
    contigmap:
      contigs: ["A25-109/0 35-35/B17-29/35-35"] # Generate 35 AA before and after the scaffold
      inpaint_seq: ["A163-168/A170-171/A179"]

  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/1YCR.pdb"
      ckpt_override_path: "../models/Complex_base_ckpt.pt"
    contigmap:
      contigs: ["A25-109/0 60-60/B17-29/60-60"] # Generate 60 AA before and after the scaffold
      inpaint_seq: ["A163-168/A170-171/A179"]

  ##### Motif Scaffolding with Inpainting #####
  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/5TPN.pdb"
    contigmap:
      contigs: ["10-10/A163-181/10-10"] # Generate 10 AA before and after the scaffold
      inpaint_seq: ["A163-168/A170-171/A179"]

  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/5TPN.pdb"
    contigmap:
      contigs: ["40-40/A163-181/40-40"] # Generate 40 AA before and after the scaffold
      inpaint_seq: ["A163-168/A170-171/A179"]

  ##### Partial Diffusion #####
  - inference:
      random_seed: 1337
      final_step: 8
      input_pdb: "input_pdbs/2KL8.pdb"
    contigmap:
      contigs: ["79-79"] # Partially diffuse the full protein
    diffuser:
      partial_T: 10

  - inference:
      random_seed: 1337
      final_step: 8
      input_pdb: "input_pdbs/2KL8.pdb"
    contigmap:
      contigs: ["A1-39/40"] # Partially diffuse half the protein
    diffuser:
      partial_T: 10

  ##### Binder Design #####
  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/insulin_target.pdb"
    contigmap:
      contigs: ["A1-150/0 50-50"] # Generate a binder of size 50 with hotspots
    ppi:
      hotspot_res: ["A59","A83","A91"]
    denoiser:
      noise_scale_ca: 0
      noise_scale_frame: 0

  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/insulin_target.pdb"
    contigmap:
      contigs: ["A1-150/0 100-100"] # Generate a binder of size 100 with hotspots
    ppi:
      hotspot_res: ["A59","A83","A91"]
    denoiser:
      noise_scale_ca: 0
      noise_scale_frame: 0

  - inference:
      random_seed: 1337
      final_step: 48
      input_pdb: "input_pdbs/insulin_target.pdb"
    contigmap:
      contigs: ["A1-150/0 75-75"] # Generate a binder of size 75 without hotspots
    denoiser:
      noise_scale_ca: 0
      noise_scale_frame: 0
